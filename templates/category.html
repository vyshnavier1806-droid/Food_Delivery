{% extends 'admin_home.html' %}

{% block body %}

<div class="p-8 max-w-2xl mx-auto">
    <!-- Header -->
    <div class="flex items-center gap-4 mb-10">
        <a href="/FoodApp/view_category"
           class="text-gray-500 hover:text-gray-700 transition-colors">
            <i class="fa-solid fa-arrow-left text-2xl"></i>
        </a>
        <div>
            <h1 class="text-4xl font-bold tracking-tighter text-gray-900">Add New Category</h1>
            <p class="text-gray-600 mt-1">Create a new food category</p>
        </div>
    </div>

    <div class="bg-white rounded-3xl p-10 border border-gray-200 shadow-xl">
        <form method="post" action="/FoodApp/category_post/"
              enctype="multipart/form-data" class="space-y-8">
            {% csrf_token %}

            <!-- Category Name -->
            <div>
                <label class="block text-xs font-semibold tracking-[1.5px] text-gray-500 mb-2">CATEGORY NAME</label>
                <input type="text" name="category" required
                       class="form-input w-full bg-white border border-gray-300 rounded-2xl px-6 py-4 text-gray-900 text-lg font-medium"
                       placeholder="Enter category name">
            </div>

            <!-- Image Upload -->
            <div>
                <label class="block text-xs font-semibold tracking-[1.5px] text-gray-500 mb-2">CATEGORY IMAGE</label>
                <div class="border-2 border-dashed border-gray-300 hover:border-yellow-500 rounded-3xl p-10 text-center transition-colors">
                    <i class="fa-solid fa-cloud-arrow-up text-6xl text-gray-400 mb-4"></i>
                    <p class="text-gray-700 font-semibold text-lg">Upload Category Image</p>
                    <p class="text-sm text-gray-500 mt-1">PNG, JPG or JPEG • Recommended size 800x600</p>

                    <input type="file" name="image" accept="image/*" required
                           class="mt-8 block w-full text-sm text-gray-600 file:mr-4 file:py-3.5 file:px-8
                                  file:rounded-2xl file:border-0 file:text-sm file:font-semibold
                                  file:bg-yellow-500 file:text-gray-900 hover:file:bg-yellow-600">
                </div>
            </div>

            <!-- Submit Buttons -->
            <div class="flex gap-4 pt-8">
                <button type="submit"
                        class="flex-1 bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-semibold py-5 rounded-3xl text-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus"></i>
                    Add Category
                </button>

                <a href="/FoodApp/view_category"
                   class="flex-1 border border-gray-300 hover:bg-gray-100 font-medium py-5 rounded-3xl text-lg text-center transition-all text-gray-700">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

    .form-input {
        transition: all 0.3s ease;
    }
    .form-input:focus {
        border-color: rgb(234 179 8);
        box-shadow: 0 0 0 4px rgba(234, 179, 8, 0.2);
        outline: none;
    }

    h1, label, input, button, a {
        font-family: 'Poppins', system-ui, sans-serif;
    }
</style>

{% endblock %}
