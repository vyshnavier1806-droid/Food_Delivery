{% extends 'admin_home.html' %}

{% block body %}

<div class="p-8 max-w-2xl mx-auto">
    <!-- Header -->
    <div class="flex items-center gap-4 mb-10">
        <a href="/FoodApp/view_food_details"
           class="text-gray-500 hover:text-gray-700 transition-colors">
            <i class="fa-solid fa-arrow-left text-2xl"></i>
        </a>
        <div>
            <h1 class="text-4xl font-bold tracking-tighter text-gray-900">Edit Food Item</h1>
            <p class="text-gray-600 mt-1 text-[17px]">Update the details of <span class="font-semibold text-gray-900">{{ data.name }}</span></p>
        </div>
    </div>

    <div class="bg-white rounded-3xl p-10 border border-gray-200 shadow-xl">
        <form method="post" action="/FoodApp/edit_post/" 
              enctype="multipart/form-data" class="space-y-8">
            {% csrf_token %}
            <input type="hidden" name="id" value="{{ data.id }}">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Food Name -->
                <div>
                    <label class="block text-xs font-semibold tracking-[1.5px] text-gray-500 mb-2">FOOD NAME</label>
                    <input type="text" name="name" value="{{ data.name }}" required
                           class="form-input w-full bg-white border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none text-gray-900 text-lg font-medium">
                </div>

                <!-- Size -->
                <div>
                    <label class="block text-xs font-semibold tracking-[1.5px] text-gray-500 mb-2">SIZE / PORTION</label>
                    <input type="text" name="size" value="{{ data.size }}" required
                           class="form-input w-full bg-white border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none text-gray-900 text-lg font-medium">
                </div>
            </div>

            <!-- Description -->
            <div>
                <label class="block text-xs font-semibold tracking-[1.5px] text-gray-500 mb-2">DESCRIPTION</label>
                <textarea name="description" rows="4" required
                          class="form-input w-full bg-white border border-gray-300 rounded-3xl px-5 py-4 focus:outline-none text-gray-900 text-base leading-relaxed">{{ data.description }}</textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Price -->
                <div>
                    <label class="block text-xs font-semibold tracking-[1.5px] text-gray-500 mb-2">PRICE (₹)</label>
                    <input type="number" name="price" step="0.01" min="0" value="{{ data.price }}" required
                           class="form-input w-full bg-white border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none text-gray-900 text-lg font-medium">
                </div>

                <!-- Available -->
                <div>
                    <label class="block text-xs font-semibold tracking-[1.5px] text-gray-500 mb-2">AVAILABLE QUANTITY</label>
                    <input type="number" name="available" value="{{ data.available }}" min="0" required
                           class="form-input w-full bg-white border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none text-gray-900 text-lg font-medium">
                </div>
            </div>

            <!-- Current Image + Upload -->
            <div>
                <label class="block text-xs font-semibold tracking-[1.5px] text-gray-500 mb-2">CURRENT IMAGE</label>
                <div class="flex items-center gap-6 mb-6">
                    {% if data.image %}
                        <img src="{{ data.image.url }}" 
                             class="w-40 h-40 object-cover rounded-2xl border border-gray-200 shadow-md" 
                             alt="{{ data.name }}">
                    {% else %}
                        <div class="w-40 h-40 bg-gray-100 rounded-2xl flex items-center justify-center text-6xl">🍽️</div>
                    {% endif %}
                </div>

                <label class="block text-xs font-semibold tracking-[1.5px] text-gray-500 mb-2">UPLOAD NEW IMAGE (Optional)</label>
                <div class="border-2 border-dashed border-gray-300 hover:border-yellow-500 rounded-3xl p-8 text-center transition-colors">
                    <i class="fa-solid fa-cloud-arrow-up text-5xl text-gray-400 mb-4"></i>
                    <p class="text-gray-700 mb-1 font-semibold text-lg">Choose New Image</p>
                    <p class="text-sm text-gray-500">Leave empty to keep current image</p>
                    
                    <input type="file" name="image" accept="image/*"
                           class="mt-6 block w-full text-sm text-gray-600 file:mr-4 file:py-3 file:px-6 
                                  file:rounded-2xl file:border-0 file:text-sm file:font-semibold 
                                  file:bg-yellow-500 file:text-gray-900 hover:file:bg-yellow-600">
                </div>
            </div>

            <!-- Submit Buttons -->
            <div class="flex gap-4 pt-8">
                <button type="submit"
                        class="flex-1 bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-semibold py-5 rounded-3xl text-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-floppy-disk"></i> 
                    Update Food Item
                </button>
                
                <a href="/FoodApp/view_food_details"
                   class="flex-1 border border-gray-300 hover:bg-gray-100 font-medium py-5 rounded-3xl text-lg text-center transition-all text-gray-700">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

    .form-input {
        transition: all 0.3s ease;
    }
    .form-input:focus {
        border-color: rgb(234 179 8);
        box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.25);
        outline: none;
    }

    h1, label, input, textarea, button, a {
        font-family: 'Poppins', system-ui, sans-serif;
    }

    h1 {
        font-weight: 700;
        letter-spacing: -0.04em;
    }

    label {
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.5px;
    }

    input, textarea {
        font-weight: 500;
    }
</style>

{% endblock %}
