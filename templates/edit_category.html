{% extends 'admin_home.html' %}

{% block body %}

<div class="p-8 max-w-2xl mx-auto">
    <!-- Header -->
    <div class="flex items-center gap-4 mb-10">
        <a href="/FoodApp/view_category"
           class="text-gray-500 hover:text-gray-700 transition-colors">
            <i class="fa-solid fa-arrow-left text-2xl"></i>
        </a>
        <div>
            <h1 class="text-4xl font-bold tracking-tighter text-gray-900">Edit Category</h1>
            <p class="text-gray-600 mt-1 text-[17px]">Update <span class="font-semibold text-gray-900">{{ data.category }}</span></p>
        </div>
    </div>

    <div class="bg-white rounded-3xl p-10 border border-gray-200 shadow-xl">
        <form method="post" action="/FoodApp/edit_category_post/"
              enctype="multipart/form-data" class="space-y-8">
            {% csrf_token %}
            <input type="hidden" name="id" value="{{ data.id }}">

            <!-- Category Name -->
            <div>
                <label class="block text-xs font-semibold tracking-[1.5px] text-gray-500 mb-2">CATEGORY NAME</label>
                <input type="text" name="category" value="{{ data.category }}" required
                       class="form-input w-full bg-white border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none text-gray-900 text-lg font-medium">
            </div>

            <!-- Current Image -->
            <div>
                <label class="block text-xs font-semibold tracking-[1.5px] text-gray-500 mb-3">CURRENT IMAGE</label>
                <div class="flex justify-center mb-6">
                    {% if data.image %}
                        <img src="{{ data.image.url }}"
                             class="w-64 h-64 object-cover rounded-3xl border border-gray-200 shadow-md"
                             alt="{{ data.category }}">
                    {% else %}
                        <div class="w-64 h-64 bg-gray-100 rounded-3xl flex items-center justify-center text-7xl">📁</div>
                    {% endif %}
                </div>
            </div>

            <!-- Upload New Image -->
            <div>
                <label class="block text-xs font-semibold tracking-[1.5px] text-gray-500 mb-2">UPLOAD NEW IMAGE (Optional)</label>
                <div class="border-2 border-dashed border-gray-300 hover:border-yellow-500 rounded-3xl p-8 text-center transition-colors">
                    <i class="fa-solid fa-cloud-arrow-up text-5xl text-gray-400 mb-4"></i>
                    <p class="text-gray-700 font-medium">Choose new image to replace current one</p>
                    <p class="text-sm text-gray-500 mt-1">Leave empty to keep current image</p>

                    <input type="file" name="image" accept="image/*"
                           class="mt-6 block w-full text-sm text-gray-600 file:mr-4 file:py-3 file:px-6
                                  file:rounded-2xl file:border-0 file:text-sm file:font-semibold
                                  file:bg-yellow-500 file:text-gray-900 hover:file:bg-yellow-600">
                </div>
            </div>

            <!-- Submit Buttons -->
            <div class="flex gap-4 pt-8">
                <button type="submit"
                        class="flex-1 bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-semibold py-5 rounded-3xl text-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Update Category
                </button>

                <a href="/FoodApp/view_category"
                   class="flex-1 border border-gray-300 hover:bg-gray-100 font-medium py-5 rounded-3xl text-lg text-center transition-all text-gray-700">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

    .form-input {
        transition: all 0.3s ease;
    }
    .form-input:focus {
        border-color: rgb(234 179 8);
        box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.25);
        outline: none;
    }

    h1, label, input, button, a {
        font-family: 'Poppins', system-ui, sans-serif;
    }
</style>

{% endblock %}
