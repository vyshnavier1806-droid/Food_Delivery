<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <style>
  .addr-wrap { padding: 1.5rem 0; font-family: sans-serif; }
  .addr-card { background: #ffffff; border-radius: 20px; overflow: hidden; max-width: 620px; margin: 0 auto; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }

  .addr-top { background: #1a1a2e; padding: 1.75rem 2rem 3rem; position: relative; }
  .addr-accent-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #6C47FF 0%, #FF6BBA 50%, #FFB347 100%); }
  .addr-icon-circle { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #6C47FF, #FF6BBA); display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 14px; border: 3px solid rgba(255,255,255,0.12); }
  .addr-title { font-size: 22px; font-weight: 700; color: #ffffff; margin: 0 0 4px; }
  .addr-subtitle { font-size: 13px; color: rgba(255,255,255,0.5); margin: 0; }

  .addr-body { padding: 1.75rem 2rem 2rem; background: #f8f9fa; }

  .addr-group { margin-bottom: 16px; }
  .addr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

  .addr-label { font-size: 12px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.07em; margin: 0 0 7px; display: block; }

  .addr-input { width: 100%; padding: 12px 16px; border: 1.5px solid #e5e7eb; border-radius: 12px; font-size: 15px; color: #1a1a2e; background: #ffffff; outline: none; box-sizing: border-box; transition: border-color 0.2s, box-shadow 0.2s; }
  .addr-input:focus { border-color: #6C47FF; box-shadow: 0 0 0 3px rgba(108,71,255,0.12); }
  .addr-input::placeholder { color: #c4c9d4; }

  .addr-divider { height: 1px; background: #e8e8e8; margin: 1.25rem 0; }

  .addr-footer { display: flex; justify-content: flex-end; }
  .addr-btn-primary { display: inline-flex; align-items: center; gap: 8px; background: #1a1a2e; color: #fff; border: none; border-radius: 40px; padding: 12px 28px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; transition: opacity 0.15s, transform 0.15s; }
  .addr-btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }

  @media (max-width: 480px) {
    .addr-grid { grid-template-columns: 1fr; }
    .addr-top { padding: 1.5rem 1.5rem 2.75rem; }
    .addr-body { padding: 1.25rem 1.5rem 1.5rem; }
  }
</style>

<div class="addr-wrap">
  <div class="addr-card">

    <!-- Header -->
    <div class="addr-top">
      <div class="addr-icon-circle">📦</div>
      <p class="addr-title">Add Delivery Address</p>
      <p class="addr-subtitle">Enter your shipping details below</p>
      <div class="addr-accent-bar"></div>
    </div>

    <!-- Form Body -->
    <div class="addr-body">
      <form method="POST" action="/FoodApp/user_make_order_post/">
        {% csrf_token %}

        <!-- Shipping Address (full width) -->
        <div class="addr-group">
          <label class="addr-label">🚚 Shipping Address</label>
          <input
            type="text"
            name="shipping_address"
            class="addr-input"
            placeholder="e.g. 45 MG Road, Ernakulam, Kerala"
          />
        </div>
          <input type="hidden" name="foodid" value="{{ data.id }}">

        <!-- Building No & Contact (side by side) -->
        <div class="addr-grid">
          <div>
            <label class="addr-label">🏢 Building No.</label>
            <input
              type="text"
              name="building_no"
              class="addr-input"
              placeholder="e.g. B-204"
            />
          </div>
          <div>
            <label class="addr-label">📞 Contact</label>
            <input
              type="tel"
              name="contact"
              class="addr-input"
              placeholder="e.g. 9876543210"
              maxlength="15"
            />
          </div>
        </div>

        <!-- Landmark (full width) -->
        <div class="addr-group">
          <label class="addr-label">📍 Landmark</label>
          <input
            type="text"
            name="landmark"
            class="addr-input"
            placeholder="e.g. Near Lulu Mall"
          />
        </div>

        <div class="addr-divider"></div>

        <!-- Submit -->
        <div class="addr-footer">
          <button type="submit" class="addr-btn-primary">
            Save Address →
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
</body>
</html>
